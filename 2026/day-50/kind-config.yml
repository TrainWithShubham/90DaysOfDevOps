kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
    - role: control-plane
      image: kindest/node:v1.33.1
    - role: worker
      image: kindest/node:v1.33.1
    - role: worker
      image: kindest/node:v1.33.1

    - role: worker
      image: kindest/node:v1.33.1
    
      extraPortMappings:
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      - containerPort: 8443
        hostPort: 8443
        protocol: TCP