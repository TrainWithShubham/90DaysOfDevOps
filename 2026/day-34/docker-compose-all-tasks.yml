version: '3.6'
services:
  database:
    labels:
      project: "flask-app"
      tier: "database"
      env: "dev"
    image: postgres:16-alpine
    restart: on-failure:5
    networks:
      - backend-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    labels:
      project: "flask-app"
      tier: "cache"
      env: "dev"
    image: redis:alpine
    restart: on-failure:5
    networks:
      - backend-network
  web:
    labels:
      project: "flask-app"
      tier: "backend"
      env: "dev"
    build: ./app
    restart: on-failure:5
    networks:
      - backend-network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_HOST: database
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    networks:
      - backend-network
    depends_on:
      - web
volumes:
  postgres-data:
networks:
  backend-network:
    driver: bridge
